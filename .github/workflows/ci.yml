name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

permissions:
  contents: read
  checks: write

jobs:
  build-test-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Restore backend
        run: dotnet restore backend/MyApp.slnx

      - name: Build backend (warnings as errors)
        run: dotnet build backend/MyApp.slnx --configuration Release --no-restore -warnaserror

      - name: Build frontend
        run: npm run build

      - name: Lint frontend
        run: npm run lint

      - name: Run backend unit tests
        run: |
          mkdir -p reports
          npm run test:xunit -- --logger "trx;LogFileName=backend-tests.trx" --results-directory reports
          dotnet tool update --global trx2junit || dotnet tool install --global trx2junit
          ~/.dotnet/tools/trx2junit reports/backend-tests.trx

      - name: Run frontend unit tests
        run: npm run test:vitest -- --reporter=default --reporter=junit --outputFile=reports/vitest-junit.xml

      - name: Run API tests
        run: |
          dotnet run --project backend/App --urls http://127.0.0.1:5001 > backend.log 2>&1 &
          BACKEND_PID=$!
          trap "kill $BACKEND_PID" EXIT

          for i in {1..30}; do
            if curl -sS http://127.0.0.1:5001 > /dev/null; then
              break
            fi
            sleep 2
          done

          curl -sS http://127.0.0.1:5001 > /dev/null
          npm run test:api

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_DIR: reports
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: playwright-junit.xml
        run: |
          npm run dev -- --host 127.0.0.1 --port 5173 > frontend.log 2>&1 &
          FRONTEND_PID=$!
          trap "kill $FRONTEND_PID" EXIT

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5173 > /dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:5173 > /dev/null
          npm run test:e2e -- --reporter=list,junit,html

      - name: npm audit (high severity or above)
        run: npm audit --audit-level=high

      - name: .NET vulnerable packages (high/critical fail)
        run: |
          dotnet list backend/MyApp.slnx package --vulnerable --include-transitive --format json > reports/dotnet-vulnerabilities.json
          HIGH_OR_CRITICAL=$(jq '[.. | objects | .severity? | strings | ascii_downcase | select(. == "high" or . == "critical")] | length' reports/dotnet-vulnerabilities.json)
          if [ "$HIGH_OR_CRITICAL" -gt 0 ]; then
            echo "Found $HIGH_OR_CRITICAL high/critical .NET vulnerabilities."
            exit 1
          fi
          echo "No high/critical .NET vulnerabilities found."

      - name: Publish backend unit test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend xUnit
          path: reports/backend-tests.trx
          reporter: dotnet-trx

      - name: Publish frontend unit test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Frontend Vitest
          path: reports/vitest-junit.xml
          reporter: java-junit

      - name: Publish E2E test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: E2E Playwright
          path: reports/playwright-junit.xml
          reporter: java-junit

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            reports/**
            playwright-report/**
            test-results/**
            backend.log
            frontend.log
          if-no-files-found: ignore
